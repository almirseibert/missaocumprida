<svg width="680" height="560" viewBox="0 0 680 560" xmlns="http://www.w3.org/2000/svg">
<style>
text{font-family:'Segoe UI',Arial,sans-serif}
.h{font-size:16px;font-weight:600;fill:#2C2C2A}
.t{font-size:14px;fill:#2C2C2A}
.th{font-size:14px;font-weight:600;fill:#2C2C2A}
.ts{font-size:12px;fill:#5F5E5A}
.c-purple rect{fill:#EEEDFE;stroke:#7F77DD;stroke-width:1}
.c-purple .th,.c-purple .t{fill:#3C3489}
.c-purple .ts{fill:#534AB7}
.c-teal rect{fill:#E1F5EE;stroke:#1D9E75;stroke-width:1}
.c-teal .th,.c-teal .t{fill:#085041}
.c-teal .ts{fill:#0F6E56}
</style>
<rect x="0" y="0" width="680" height="560" fill="#ffffff"/>
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
<text class="h" x="40" y="32">Como funciona — ciclo do marketplace</text>

<g class="c-purple"><rect x="180" y="50" width="320" height="56" rx="8"/>
<text class="th" x="340" y="72" text-anchor="middle" dominant-baseline="central">Cliente publica o pedido</text>
<text class="ts" x="340" y="90" text-anchor="middle" dominant-baseline="central">categoria, questionario e fotos</text></g>

<g class="c-purple"><rect x="180" y="130" width="320" height="56" rx="8"/>
<text class="th" x="340" y="152" text-anchor="middle" dominant-baseline="central">Prestadores enviam propostas</text>
<text class="ts" x="340" y="170" text-anchor="middle" dominant-baseline="central">valor e mensagem, por regiao</text></g>

<g class="c-purple"><rect x="180" y="210" width="320" height="56" rx="8"/>
<text class="th" x="340" y="232" text-anchor="middle" dominant-baseline="central">Cliente aceita e paga</text>
<text class="ts" x="340" y="250" text-anchor="middle" dominant-baseline="central">PIX ou cartao - valor em escrow</text></g>

<g class="c-teal"><rect x="180" y="290" width="320" height="56" rx="8"/>
<text class="th" x="340" y="312" text-anchor="middle" dominant-baseline="central">Execucao com prova</text>
<text class="ts" x="340" y="330" text-anchor="middle" dominant-baseline="central">check-in e conclusao: foto + GPS</text></g>

<g class="c-teal"><rect x="180" y="370" width="320" height="56" rx="8"/>
<text class="th" x="340" y="392" text-anchor="middle" dominant-baseline="central">Seguranca de Transacao</text>
<text class="ts" x="340" y="410" text-anchor="middle" dominant-baseline="central">em garantia 7 dias + revisao</text></g>

<g class="c-purple"><rect x="180" y="450" width="320" height="56" rx="8"/>
<text class="th" x="340" y="472" text-anchor="middle" dominant-baseline="central">Liberacao e avaliacao</text>
<text class="ts" x="340" y="490" text-anchor="middle" dominant-baseline="central">PIX ao prestador - reputacao</text></g>

<line x1="340" y1="108" x2="340" y2="128" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="340" y1="188" x2="340" y2="208" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="340" y1="268" x2="340" y2="288" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="340" y1="348" x2="340" y2="368" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="340" y1="428" x2="340" y2="448" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

<path d="M500 478 L560 478 L560 78 L500 78" fill="none" stroke="#888780" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)"/>

<text class="ts" x="40" y="538">Teal = diferenciais de confianca - seta tracejada = ciclo de reputacao</text>
</svg>
