<g class="c-blue"><rect x="40" y="112" width="180" height="40" rx="8"/><text class="t" x="130" y="132" text-anchor="middle" dominant-baseline="central">Carlos - reparos</text></g>
<g class="c-blue"><rect x="40" y="164" width="180" height="40" rx="8"/><text class="t" x="130" y="184" text-anchor="middle" dominant-baseline="central">Ana - aulas/beleza</text></g>

<g class="c-teal"><rect x="460" y="60" width="180" height="40" rx="8"/><text class="t" x="550" y="80" text-anchor="middle" dominant-baseline="central">Joao - eletricista</text></g>
<g class="c-teal"><rect x="460" y="112" width="180" height="40" rx="8"/><text class="t" x="550" y="132" text-anchor="middle" dominant-baseline="central">Rosa - diarista</text></g>
<g class="c-teal"><rect x="460" y="164" width="180" height="40" rx="8"/><text class="t" x="550" y="184" text-anchor="middle" dominant-baseline="central">Diego - montador</text></g>

<g class="c-purple"><rect x="260" y="97" width="160" height="70" rx="8"/>
<text class="th" x="340" y="125" text-anchor="middle" dominant-baseline="central">Missao Cumprida</text>
<text class="ts" x="340" y="145" text-anchor="middle" dominant-baseline="central">match + escrow</text></g>

<line x1="222" y1="132" x2="258" y2="132" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="422" y1="132" x2="458" y2="132" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="340" y1="169" x2="340" y2="238" stroke="#888780" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)"/>

<g class="c-gray"><rect x="120" y="240" width="440" height="56" rx="8"/>
<text class="th" x="340" y="262" text-anchor="middle" dominant-baseline="central">Maior concorrente: o informal</text>
<text class="ts" x="340" y="280" text-anchor="middle" dominant-baseline="central">WhatsApp / indicacao - 0% de taxa</text></g>
