<svg width="680" height="372" viewBox="0 0 680 372" xmlns="http://www.w3.org/2000/svg">
<style>
text{font-family:'Segoe UI',Arial,sans-serif}
.h{font-size:16px;font-weight:600;fill:#2C2C2A}
.t{font-size:14px;fill:#2C2C2A}
.th{font-size:14px;font-weight:600;fill:#2C2C2A}
.ts{font-size:12px;fill:#5F5E5A}
.c-gray rect{fill:#F1EFE8;stroke:#B4B2A9;stroke-width:1}
.c-gray .th,.c-gray .t{fill:#2C2C2A}
.c-gray .ts{fill:#5F5E5A}
.c-teal rect{fill:#E1F5EE;stroke:#1D9E75;stroke-width:1}
.c-teal .th,.c-teal .t{fill:#085041}
.c-teal .ts{fill:#0F6E56}
.c-amber rect{fill:#FAEEDA;stroke:#EF9F27;stroke-width:1}
.c-amber .th,.c-amber .t{fill:#633806}
.c-amber .ts{fill:#854F0B}
</style>
<rect x="0" y="0" width="680" height="372" fill="#ffffff"/>
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
<text class="h" x="40" y="30">Monetizacao — para onde vai o dinheiro</text>

<g class="c-gray"><rect x="190" y="50" width="300" height="56" rx="8"/>
<text class="th" x="340" y="72" text-anchor="middle" dominant-baseline="central">Cliente paga = R$220</text>
<text class="ts" x="340" y="90" text-anchor="middle" dominant-baseline="central">servico R$200 + taxas</text></g>

<g class="c-gray"><rect x="190" y="150" width="300" height="56" rx="8"/>
<text class="th" x="340" y="172" text-anchor="middle" dominant-baseline="central">Em garantia (escrow)</text>
<text class="ts" x="340" y="190" text-anchor="middle" dominant-baseline="central">Seguranca de Transacao - 7 dias</text></g>

<g class="c-amber"><rect x="70" y="270" width="250" height="56" rx="8"/>
<text class="th" x="195" y="292" text-anchor="middle" dominant-baseline="central">Plataforma</text>
<text class="ts" x="195" y="310" text-anchor="middle" dominant-baseline="central">take ~10-20% + gateway</text></g>

<g class="c-teal"><rect x="360" y="270" width="250" height="56" rx="8"/>
<text class="th" x="485" y="292" text-anchor="middle" dominant-baseline="central">Prestador recebe</text>
<text class="ts" x="485" y="310" text-anchor="middle" dominant-baseline="central">= R$180 - apos 7 dias</text></g>

<line x1="340" y1="108" x2="340" y2="148" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
<path d="M340 206 L340 240 L195 240 L195 268" fill="none" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
<path d="M340 206 L340 240 L485 240 L485 268" fill="none" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

<text class="ts" x="40" y="352">Exemplo ilustrativo - valores aproximados em BRL</text>
</svg>
